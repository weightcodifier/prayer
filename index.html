<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>목장 기도 대시보드</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ec;
        --surface: #fffdf8;
        --surface-strong: #ffffff;
        --ink: #202124;
        --muted: #6e6258;
        --line: #e1d8ca;
        --accent: #2f6f73;
        --accent-ink: #ffffff;
        --sage: #dfe9dc;
        --clay: #d88f66;
        --rose: #b86b77;
        --gold: #b18c3c;
        --blue: #547b9f;
        --shadow: 0 18px 50px rgba(64, 48, 30, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 253, 248, 0.88), rgba(247, 243, 236, 0.96)),
          radial-gradient(circle at top left, rgba(47, 111, 115, 0.16), transparent 32rem),
          var(--bg);
        color: var(--ink);
        font-family:
          "Pretendard",
          "Noto Sans KR",
          "Segoe UI",
          system-ui,
          sans-serif;
        overflow-x: hidden;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .login-page {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .login-panel {
        width: min(100%, 440px);
        padding: 34px;
        border: 1px solid rgba(225, 216, 202, 0.88);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.94);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      .login-panel h1,
      .topbar h1 {
        margin-bottom: 8px;
        line-height: 1.15;
      }

      .login-panel h1 {
        font-size: 30px;
      }

      .login-copy {
        margin-bottom: 26px;
        color: var(--muted);
        line-height: 1.6;
      }

      .login-form label,
      .control label {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .password-row {
        display: flex;
        gap: 8px;
      }

      .password-row input,
      .toolbar input,
      .toolbar select {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        outline: none;
      }

      .password-row input {
        flex: 1;
        padding: 13px 14px;
      }

      .password-row button,
      .ghost-button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: var(--accent-ink);
        font-weight: 800;
      }

      .password-row button {
        padding: 0 18px;
      }

      .ghost-button {
        padding: 10px 14px;
      }

      .login-message {
        min-height: 22px;
        margin: 12px 0 0;
        color: #b43f47;
        font-size: 13px;
      }

      .login-message.success {
        color: #2f6f73;
        font-weight: 800;
      }

      .login-form.is-success .password-row {
        opacity: 0.62;
        pointer-events: none;
      }

      .app {
        width: min(1460px, 100%);
        margin: 0 auto;
        padding: 26px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        padding: 22px 0;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .meta-chip,
      .status-pill,
      .category-pill,
      .week-pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        border-radius: 999px;
        padding: 5px 11px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 180px 180px minmax(220px, 1fr);
        gap: 12px;
        margin-bottom: 18px;
        padding: 14px;
        border: 1px solid rgba(225, 216, 202, 0.78);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.76);
      }

      .toolbar input,
      .toolbar select {
        width: 100%;
        min-height: 42px;
        padding: 9px 12px;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .sidebar {
        position: sticky;
        top: 18px;
        max-height: calc(100vh - 36px);
        overflow: auto;
        padding: 10px;
        border: 1px solid rgba(225, 216, 202, 0.82);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.82);
      }

      .person-list {
        display: grid;
        gap: 7px;
        margin-top: 8px;
      }

      .person-link {
        display: grid;
        width: 100%;
        grid-template-columns: 42px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        border: 0;
        border-radius: 8px;
        padding: 9px;
        background: transparent;
        color: var(--ink);
        text-align: left;
      }

      .person-link:hover,
      .person-link.active {
        background: #edf3ed;
      }

      .person-link strong,
      .person-link small {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .person-link small {
        color: var(--muted);
        font-size: 12px;
      }

      .avatar {
        display: inline-grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 50%;
        background: var(--sage);
        color: #1f4d50;
        font-size: 13px;
        font-weight: 900;
      }

      .avatar.all {
        border-radius: 8px;
        background: var(--accent);
        color: white;
      }

      .main-view {
        min-width: 0;
      }

      .section-header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .section-header h2 {
        margin-bottom: 4px;
        font-size: 28px;
        line-height: 1.2;
      }

      .section-header p {
        margin-bottom: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .kpi-card,
      .panel,
      .entry-card,
      .person-summary-card {
        border: 1px solid rgba(225, 216, 202, 0.82);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.88);
        box-shadow: 0 10px 24px rgba(64, 48, 30, 0.06);
      }

      .kpi-card {
        min-height: 118px;
        padding: 18px;
      }

      .kpi-card span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .kpi-card strong {
        display: block;
        margin-top: 10px;
        font-size: 32px;
        line-height: 1;
      }

      .kpi-card p {
        margin: 9px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .grid-two {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
        gap: 18px;
      }

      .panel {
        min-width: 0;
        padding: 18px;
      }

      .panel h3 {
        margin-bottom: 14px;
        font-size: 18px;
      }

      .entry-grid,
      .people-grid {
        display: grid;
        gap: 12px;
      }

      .entry-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .people-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .entry-card,
      .person-summary-card {
        padding: 15px;
      }

      .entry-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .entry-card h3,
      .person-summary-card h3 {
        margin: 0;
        font-size: 16px;
      }

      .entry-card p,
      .person-summary-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.68;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .entry-card p {
        color: #3a3732;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }

      .category-pill {
        background: var(--sage);
        color: #284f50;
      }

      .category-pill.health {
        background: #e8dfe8;
        color: #784a66;
      }

      .category-pill.work {
        background: #e2e9f0;
        color: #315d80;
      }

      .category-pill.family {
        background: #f2e2dc;
        color: #884f39;
      }

      .category-pill.faith {
        background: #e1eadc;
        color: #3e663e;
      }

      .category-pill.service {
        background: #f2ead0;
        color: #745a1e;
      }

      .empty-state {
        display: grid;
        min-height: 170px;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        text-align: center;
      }

      .progress-list {
        display: grid;
        gap: 13px;
      }

      .progress-item {
        display: grid;
        gap: 6px;
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .progress-track {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: #efe7dc;
      }

      .progress-bar {
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip-button {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 10px;
        background: #ffffff;
        color: var(--muted);
        font-weight: 800;
      }

      .person-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 0.5fr);
        gap: 18px;
        margin-bottom: 18px;
      }

      .verse-box {
        padding: 20px;
        border-radius: 8px;
        background: #263f42;
        color: #fffdf8;
      }

      .verse-box p {
        margin: 0;
        line-height: 1.72;
        white-space: pre-wrap;
      }

      .annual-box {
        padding: 20px;
        border-radius: 8px;
        background: #fffdf8;
        border: 1px solid rgba(225, 216, 202, 0.82);
      }

      .timeline {
        display: grid;
        gap: 12px;
      }

      .timeline-item {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 12px;
      }

      .timeline-date {
        color: var(--accent);
        font-size: 13px;
        font-weight: 900;
      }

      .timeline-body {
        padding-bottom: 13px;
        border-bottom: 1px solid var(--line);
      }

      .timeline-body p {
        margin: 0;
        line-height: 1.68;
        white-space: pre-wrap;
      }

      .small-note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      @media (max-width: 1080px) {
        .layout,
        .grid-two,
        .person-hero {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          max-height: none;
        }

        .person-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .kpi-grid,
        .people-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        body {
          background:
            linear-gradient(180deg, rgba(255, 253, 248, 0.92), rgba(247, 243, 236, 0.98)),
            var(--bg);
        }

        .login-page {
          align-items: start;
          padding: 18px;
          padding-top: 14vh;
        }

        .login-panel {
          padding: 24px 20px;
        }

        .login-panel h1 {
          font-size: 25px;
        }

        .login-copy {
          margin-bottom: 22px;
          font-size: 15px;
        }

        .app {
          padding: 12px;
        }

        .topbar,
        .section-header {
          align-items: stretch;
          flex-direction: column;
        }

        .topbar {
          gap: 12px;
          padding: 14px 2px;
        }

        .topbar h1 {
          font-size: 24px;
        }

        .top-actions {
          justify-content: space-between;
        }

        .layout {
          gap: 12px;
        }

        .sidebar {
          margin: 0 -12px;
          max-width: calc(100vw - 0px);
          border-right: 0;
          border-left: 0;
          border-radius: 0;
          overflow-x: auto;
          overflow-y: hidden;
          scrollbar-width: thin;
        }

        .sidebar,
        .person-list {
          display: flex;
          gap: 8px;
        }

        .person-list {
          margin-top: 0;
        }

        .sidebar .person-link {
          width: 178px;
          min-width: 178px;
          grid-template-columns: 36px minmax(0, 1fr);
          padding: 8px;
        }

        .avatar {
          width: 36px;
          height: 36px;
          font-size: 12px;
        }

        .toolbar,
        .kpi-grid,
        .entry-grid,
        .people-grid {
          grid-template-columns: 1fr;
        }

        .toolbar {
          gap: 10px;
          padding: 12px;
        }

        .section-header h2 {
          font-size: 22px;
        }

        .kpi-card {
          min-height: auto;
          padding: 15px;
        }

        .kpi-card strong {
          font-size: 28px;
        }

        .panel,
        .entry-card,
        .person-summary-card,
        .verse-box,
        .annual-box {
          padding: 14px;
        }

        .entry-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .week-pill,
        .status-pill,
        .meta-chip {
          white-space: normal;
        }

        .password-row {
          flex-direction: column;
        }

        .password-row button {
          min-height: 44px;
        }

        .timeline-item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section id="login" class="login-page">
      <div class="login-panel">
        <h1>2026 권혜연 목장 기도 대시보드</h1>
        <p class="login-copy">암호를 입력하면 우리목장의 기도제목을 확인할 수 있습니다.</p>
        <form id="loginForm" class="login-form">
          <label for="passwordInput">접속 암호</label>
          <div class="password-row">
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="암호 입력" />
            <button type="submit">열기</button>
          </div>
          <p id="loginMessage" class="login-message" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <div id="app" class="app" hidden>
      <header class="topbar">
        <div>
          <p class="eyebrow">Mokjang Prayer Dashboard</p>
          <h1>목장 기도 대시보드</h1>
        </div>
        <div class="top-actions">
          <span id="generatedAt" class="meta-chip"></span>
          <button id="logoutButton" class="ghost-button" type="button">잠금</button>
        </div>
      </header>

      <section class="toolbar" aria-label="대시보드 필터">
        <div class="control">
          <label for="weekSelect">주간</label>
          <select id="weekSelect"></select>
        </div>
        <div class="control">
          <label for="categorySelect">분류</label>
          <select id="categorySelect"></select>
        </div>
        <div class="control search-control">
          <label for="searchInput">검색</label>
          <input id="searchInput" type="search" placeholder="이름, 기도제목, 말씀 검색" />
        </div>
      </section>

      <div class="layout">
        <aside class="sidebar" aria-label="개인별 메뉴">
          <button id="overviewButton" class="person-link active" type="button">
            <span class="avatar all">전체</span>
            <span>
              <strong>통합 대시보드</strong>
              <small>이번 주 흐름</small>
            </span>
          </button>
          <div id="personList" class="person-list"></div>
        </aside>

        <main id="mainView" class="main-view" tabindex="-1"></main>
      </div>
    </div>

    <script>
      const PASSWORD_KEY = "mokjang-dashboard-unlocked";
      const ACCESS_HASH = "da1bef3d778778d3e7f0d3becaac6f1a63ed0e3706b65160880fb8e295e1279c";

      const state = {
        data: null,
        selectedWeekId: "latest",
        selectedCategory: "all",
        selectedPersonId: null,
        search: "",
      };

      const els = {
        login: document.querySelector("#login"),
        app: document.querySelector("#app"),
        loginForm: document.querySelector("#loginForm"),
        passwordInput: document.querySelector("#passwordInput"),
        loginMessage: document.querySelector("#loginMessage"),
        generatedAt: document.querySelector("#generatedAt"),
        logoutButton: document.querySelector("#logoutButton"),
        weekSelect: document.querySelector("#weekSelect"),
        categorySelect: document.querySelector("#categorySelect"),
        searchInput: document.querySelector("#searchInput"),
        overviewButton: document.querySelector("#overviewButton"),

        mainView: document.querySelector("#mainView"),
      };

      const categoryMeta = {
        "신앙": { className: "faith", color: "#4f7c54" },
        "건강": { className: "health", color: "#a65d81" },
        "일/학업": { className: "work", color: "#547b9f" },
        "가정/관계": { className: "family", color: "#bd7451" },
        "사역/섬김": { className: "service", color: "#b18c3c" },
        "기타": { className: "", color: "#2f6f73" },
      };

      function escapeHtml(value = "") {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function sha256(text) {
        if (!crypto.subtle) {
          throw new Error("이 브라우저에서는 암호 확인 기능을 사용할 수 없습니다.");
        }
        const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
        return [...new Uint8Array(digest)].map((byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      function formatDateTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("ko-KR", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        }).format(date);
      }

      function loadEmbeddedData() {
        const node = document.querySelector("#dashboardData");
        state.data = JSON.parse(node.textContent);
      }

      function getLatestWeekId() {
        return state.data.weeks.at(-1)?.id ?? "";
      }

      function selectedWeek() {
        const id = state.selectedWeekId === "latest" ? getLatestWeekId() : state.selectedWeekId;
        return state.data.weeks.find((week) => week.id === id) ?? state.data.weeks.at(-1);
      }

      function matchesSearch(entryOrPerson) {
        const keyword = state.search.trim().toLowerCase();
        if (!keyword) return true;
        const haystack = [
          entryOrPerson.name,
          entryOrPerson.personName,
          entryOrPerson.content,
          entryOrPerson.annualPrayer,
          entryOrPerson.verse,
          entryOrPerson.categories?.join(" "),
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
        return haystack.includes(keyword);
      }

      function filterEntries(entries) {
        return entries.filter((entry) => {
          const categoryMatch = state.selectedCategory === "all" || entry.categories.includes(state.selectedCategory);
          return categoryMatch && matchesSearch(entry);
        });
      }

      function entriesForWeek(weekId) {
        return state.data.entries.filter((entry) => entry.weekId === weekId);
      }

      function entriesForPerson(personId) {
        return state.data.entries.filter((entry) => entry.personId === personId);
      }

      function categoriesForEntries(entries) {
        return entries.reduce((counts, entry) => {
          for (const category of entry.categories) {
            counts[category] = (counts[category] ?? 0) + 1;
          }
          return counts;
        }, {});
      }

      function categoryPill(category) {
        const meta = categoryMeta[category] ?? categoryMeta["기타"];
        return `<span class="category-pill ${meta.className}">${escapeHtml(category)}</span>`;
      }

      function entryCard(entry) {
        return `
          <article class="entry-card">
            <div class="entry-head">
              <h3>${escapeHtml(entry.personName)}</h3>
              <span class="week-pill">${escapeHtml(entry.weekLabel)}</span>
            </div>
            <p>${escapeHtml(entry.content)}</p>
            <div class="tags">${entry.categories.map(categoryPill).join("")}</div>
          </article>
        `;
      }

      function personButton(person) {
        const active = state.selectedPersonId === person.id ? "active" : "";
        const count = entriesForPerson(person.id).length;
        return `
          <button class="person-link ${active}" type="button" data-person-id="${escapeHtml(person.id)}">
            <span class="avatar" style="background:${person.color}">${escapeHtml(person.initials)}</span>
            <span>
              <strong>${escapeHtml(person.name)}</strong>
              <small>${count}개 기록</small>
            </span>
          </button>
        `;
      }

      function renderSidebar() {
        els.overviewButton.classList.toggle("active", !state.selectedPersonId);
        els.personList.innerHTML = state.data.people.filter(matchesSearch).map(personButton).join("");
      }

      function renderFilters() {
        const currentWeekId = selectedWeek()?.id;
        els.weekSelect.innerHTML = [
          `<option value="latest">최근 주간</option>`,
          ...state.data.weeks
            .slice()
            .reverse()
            .map((week) => `<option value="${escapeHtml(week.id)}">${escapeHtml(week.label)}</option>`),
        ].join("");
        els.weekSelect.value = state.selectedWeekId === "latest" ? "latest" : currentWeekId;

        const categories = Object.keys(categoryMeta);
        els.categorySelect.innerHTML = [
          `<option value="all">전체 분류</option>`,
          ...categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`),
        ].join("");
        els.categorySelect.value = state.selectedCategory;
      }

      function renderProgress(counts, total) {
        const rows = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        if (!rows.length) {
          return `<div class="empty-state">분류할 기도제목이 없습니다.</div>`;
        }

        return `
          <div class="progress-list">
            ${rows
              .map(([category, count]) => {
                const meta = categoryMeta[category] ?? categoryMeta["기타"];
                const width = total > 0 ? Math.round((count / total) * 100) : 0;
                return `
                  <div class="progress-item">
                    <div class="progress-label">
                      <span>${escapeHtml(category)}</span>
                      <span>${count}개</span>
                    </div>
                    <div class="progress-track">
                      <div class="progress-bar" style="width:${width}%; background:${meta.color}"></div>
                    </div>
                  </div>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function renderOverview() {
        const week = selectedWeek();
        const weekEntriesRaw = entriesForWeek(week.id);
        const weekEntries = filterEntries(weekEntriesRaw);

        const totalPeople = state.data.people.length;
        const updateRate = totalPeople ? Math.round((peopleWithEntry.size / totalPeople) * 100) : 0;
        const yearlyReady = state.data.people.filter((person) => person.annualPrayer || person.verse).length;

        els.mainView.innerHTML = `

            </div>
            <span class="status-pill">${peopleWithEntry.size}/${totalPeople}명 업데이트</span>
          </section>

          <section class="kpi-grid">
            <article class="kpi-card">
              <span>이번 주 업데이트율</span>
              <strong>${updateRate}%</strong>
              <p>${peopleWithEntry.size}명이 이번 주 기도제목을 남겼습니다.</p>

              <strong>${yearlyReady}</strong>
              <p>올해 말씀 또는 기도제목이 등록된 인원입니다.</p>
            </article>
          </section>

          <section class="grid-two">
            <div class="panel">
              <h3>이번 주 함께 기도할 제목</h3>

              }
            </div>

            <div class="panel">
              <h3>분류별 흐름</h3>

                  : `<p class="small-note">모든 인원이 이번 주 기도제목을 남겼습니다.</p>`
              }
            </div>
          </section>
        `;
      }

            <div class="annual-box">
              <h3>올해 기도제목</h3>
              <p>${escapeHtml(person.annualPrayer || "올해 기도제목이 아직 비어 있습니다.")}</p>
            </div>
          </section>

          <section class="grid-two">
            <div class="panel">
              <h3>${escapeHtml(week.label)} 기도제목</h3>
              ${currentEntry ? entryCard(currentEntry) : `<div class="empty-state">선택한 주간에는 등록된 기도제목이 없습니다.</div>`}
            </div>
            <div class="panel">
              <h3>개인 분류 흐름</h3>
              ${renderProgress(categoryCounts, filteredEntries.length)}
            </div>
          </section>

          <section class="panel" style="margin-top:18px">
            <h3>주간 기록 타임라인</h3>
            ${
              filteredEntries.length
                ? `<div class="timeline">
                    ${filteredEntries
                      .slice()
                      .reverse()
                      .map(
                        (entry) => `
                          <div class="timeline-item">
                            <div class="timeline-date">${escapeHtml(entry.weekLabel)}</div>
                            <div class="timeline-body">
                              <p>${escapeHtml(entry.content)}</p>
                              <div class="tags">${entry.categories.map(categoryPill).join("")}</div>
                            </div>
                          </div>
                        `,
                      )
                      .join("")}
                  </div>`
                : `<div class="empty-state">선택한 조건에 맞는 기록이 없습니다.</div>`
            }
          </section>
        `;
      }

      function render() {
        renderFilters();
        renderSidebar();
        if (state.selectedPersonId) {
          renderPerson(state.selectedPersonId);
        } else {
          renderOverview();
        }
      }

      function unlock() {
        loadEmbeddedData();
        els.generatedAt.textContent = `생성 ${formatDateTime(state.data.generatedAt)}`;
        els.login.hidden = true;
        els.app.hidden = false;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showLoginSuccess() {
        els.loginForm.classList.add("is-success");
        els.loginMessage.classList.add("success");
        els.loginMessage.textContent = "로그인 완료, 아래로 내리면 내용을 확인할 수 있습니다";
      }

      function bindEvents() {
        els.loginForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          const password = els.passwordInput.value.trim();
          els.loginMessage.classList.remove("success");
          if (!password) {
            els.loginMessage.textContent = "암호를 입력해 주세요.";
            return;
          }

          try {
            const hashed = await sha256(password);
            if (hashed !== ACCESS_HASH) {
              els.loginMessage.textContent = "암호가 맞지 않습니다.";
              return;
            }
            sessionStorage.setItem(PASSWORD_KEY, ACCESS_HASH);
            showLoginSuccess();
            window.setTimeout(unlock, 650);
          } catch (error) {
            els.loginMessage.textContent = error.message;
          }
        });

        els.logoutButton.addEventListener("click", () => {
          sessionStorage.removeItem(PASSWORD_KEY);
          window.location.reload();
        });

        els.weekSelect.addEventListener("change", (event) => {
          state.selectedWeekId = event.target.value;
          render();
        });

        els.categorySelect.addEventListener("change", (event) => {
          state.selectedCategory = event.target.value;
          render();
        });

        els.searchInput.addEventListener("input", (event) => {
          state.search = event.target.value;
          render();
        });

        els.overviewButton.addEventListener("click", () => {
          state.selectedPersonId = null;
          render();
          els.mainView.focus();
        });

        document.addEventListener("click", (event) => {
          const personTarget = event.target.closest("[data-person-id]");
          if (!personTarget) return;
          state.selectedPersonId = personTarget.dataset.personId;
          render();
          els.mainView.focus();
        });
      }

      function init() {
        bindEvents();
        if (sessionStorage.getItem(PASSWORD_KEY) === ACCESS_HASH) {
          unlock();
        } else {
          els.passwordInput.focus();
        }
      }

      init();
    </script>
  </body>
</html>
